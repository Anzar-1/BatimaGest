{%load static%}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batima-Gest - Gestion de Copropriété</title>
    <link rel="stylesheet" href="{%static 'css/BatimaGes.css'%}">
</head>
<body>

    <!-- Page de connexion -->
    <div id="login-page" class="page active">
        <div class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <h1>Batima-Gest</h1>
                    <p>Gestion de copropriété simplifiée</p>
                </div>

                <form action = "" method = "POST" id="login-form" class="login-form">
                    {%csrf_token%}

                    <div class="form-group">
                        {{form.username.errors}}
                        <label>username</label>
                        {{form.username}}
                    </div>

                    <div class="form-group">
                        {{form.password.errors}}
                        <label>Mot de passe</label>
                        {{form.password}}
                    </div>

                    <input type="submit" value="Se connecter"/>
                </form>

                <div class="login-footer">
                    <button id="toggle-signup" class="btn-link">
                        Pas de compte ? S'inscrire
                    </button>
                </div>
            </div>
        </div>
    </div>

  <!--<script type="text/javascript" src = "{% static 'js/index.js' %} "></script>-->
</body>
</html
